name = "job-search-hub"
pages_build_output_dir = "dist"
compatibility_date = "2026-07-01"

[vars]
# Non-secret environment variables go here

# Secret env vars set via: wrangler secret put BRIGHT_DATA_API_KEY
# Secret env vars set via: wrangler secret put ANTHROPIC_API_KEY
# Secret env vars set via: wrangler secret put CRON_SECRET

[[d1_databases]]
binding = "DB"
database_name = "job-search-hub"
database_id = "REPLACE_WITH_YOUR_D1_ID"

[[kv_namespaces]]
binding = "KV"
id = "REPLACE_WITH_YOUR_KV_ID"
